version: "3.9"

services:
  db:
    image: postgis/postgis:15-3.4
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${DATABASE_NAME}
      POSTGRES_USER: ${DATABASE_USER}
      POSTGRES_PASSWORD: ${DATABASE_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"

  redis:
    image: redis:7
    ports:
      - "6379:6379"

  web:
    build: .
    command: >
      micromamba run -n civicview python manage.py runserver 0.0.0.0:8000
    depends_on:
      - db
      - redis
    ports:
      - "8000:8000"
    env_file:
      - .env

  worker:
    build: .
    command: >
      micromamba run -n civicview celery -A civicview_project worker -l info
    depends_on:
      - db
      - redis
    env_file:
      - .env

volumes:
  postgres_data:


